name: test-ncnn

on:
  push:
    branches:
      - "test/add-ncnn-*"
  workflow_dispatch:

jobs:
  test-ncnn:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"

      - name: Install Packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build python3-pyelftools elfutils patchelf nasm
          sudo apt-get install -y autoconf automake autoconf-archive

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1

      - uses: actions/cache@v3
        with:
          path: |
            vcpkg/downloads/
            ~/.cache/ccache/
          key: cache-ncnn-android-arm64-${{ hashfiles('vcpkg-overlay', 'vcpkg*.json') }}
          restore-keys: |
            cache-ncnn-android-arm64-

      - uses: actions/cache@v3
        with:
          path: |
            vcpkg/installed/maa-arm64-android/
          key: cache-installed-ncnn-android-arm64-${{ hashfiles('vcpkg-overlay', 'vcpkg*.json') }}

      - name: Build MaaDeps
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          for attempt in 1 2 3
          do
            python3 build.py --tarball --target maa-arm64-android -- $MAA_CMAKE_ARGS && break
            shopt -s globstar nullglob
            df -lh
            rm -f vcpkg/buildtrees/**/*.{o,obj,a,lib}
            df -lh
            du -sh vcpkg/buildtrees/*
            [[ $attempt != 3 ]]
          done

      - name: Verify ncnn artifacts
        run: |
          INSTALL_DIR="vcpkg/installed/maa-arm64-android"
          echo "=== Checking ncnn in $INSTALL_DIR ==="
          if [ -f "$INSTALL_DIR/include/ncnn/cpu.h" ]; then
            echo "OK: ncnn headers found"
          else
            echo "FAIL: ncnn headers not found"
            ls "$INSTALL_DIR/include/" || true
            exit 1
          fi
          if ls "$INSTALL_DIR/lib/"*ncnn* 1>/dev/null 2>&1; then
            echo "OK: ncnn library found"
            ls "$INSTALL_DIR/lib/"*ncnn*
          else
            echo "FAIL: ncnn library not found"
            ls "$INSTALL_DIR/lib/" || true
            exit 1
          fi

      - name: Collect Logs
        if: always()
        run: |
          shopt -s globstar
          tar caf logs.tar --ignore-failed-read vcpkg/buildtrees/**/*.log

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-ncnn-arm64-android
          path: logs.tar

      - name: Upload Tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-arm64-android
          path: tarball
